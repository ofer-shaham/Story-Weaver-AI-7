services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: story
      POSTGRES_PASSWORD: story
      POSTGRES_DB: story_together
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U story -d story_together"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://story:story@db:5432/story_together
      PORT: "8080"
    volumes:
      - ./artifacts/api-server/config.json:/app/artifacts/api-server/config.json:ro
    ports:
      - "8080:8080"

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: "5173"
      BASE_PATH: "/"
    ports:
      - "5173:5173"

volumes:
  db_data:
