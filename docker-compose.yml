services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: story
      POSTGRES_PASSWORD: story
      POSTGRES_DB: story_together
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U story -d story_together"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CI: "true"
    volumes:
      - ./:/app:cached
      - /app/node_modules
      - ./artifacts/api-server/config.json:/app/artifacts/api-server/config.json:ro
    ports:
      - "8080:8080"
    command: ["/bin/sh", "-lc", "cd /app && corepack pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run dev"]

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: "no"
    depends_on:
      - api
    environment:
      PORT: "5173"
      BASE_PATH: "/"
      CI: "true"
    volumes:
      - ./:/app:cached
      - /app/node_modules
    ports:
      - "5173:5173"
    command: ["/bin/sh", "-lc", "cd /app && corepack pnpm install --frozen-lockfile && pnpm --filter @workspace/story-app run dev"]

volumes:
  db_data:
